{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Jericho Blando — Portfolio{% endblock %}</title>
  <meta name="description" content="Personal portfolio of Jericho Blando — IT student and developer." />
  <link rel="stylesheet" href="{% static 'portfolio/css/style.css' %}" />
  <!-- Feather Icons -->
  <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="{% url 'home' %}" class="nav-logo">Jericho<span>.</span></a>

    <ul class="nav-links">
      <li><a href="{% url 'home' %}"      {% if active == 'home'      %}class="active"{% endif %}>Home</a></li>
      <li><a href="{% url 'about' %}"     {% if active == 'about'     %}class="active"{% endif %}>About</a></li>
      <li><a href="{% url 'skills' %}"    {% if active == 'skills'    %}class="active"{% endif %}>Skills</a></li>
      <li><a href="{% url 'projects' %}"  {% if active == 'projects'  %}class="active"{% endif %}>Projects</a></li>
      <li><a href="{% url 'education' %}" {% if active == 'education' %}class="active"{% endif %}>Education</a></li>
      <li><a href="{% url 'contact' %}"   {% if active == 'contact'   %}class="active"{% endif %}>Contact</a></li>
    </ul>

    <button class="nav-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- PAGE CONTENT -->
  <div class="page-content">
    {% block content %}{% endblock %}
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2025 <strong>Jericho Blando</strong>. Built with <a href="https://www.djangoproject.com/" target="_blank">Django</a>.</p>
  </footer>

  <script src="{% static 'portfolio/js/main.js' %}"></script>
  <script>feather.replace();</script>
</body>
</html>
